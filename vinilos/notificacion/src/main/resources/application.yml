server:
  port: 8090

spring:
  application:
    name: notificacion-service
  datasource:
    url: jdbc:mysql://localhost:3306/db_notificaciones
    username: root
    password:


    flyway:
      enabled: true
      baseline-on-migrate: true

    jpa:
      hibernate:
        ddl-auto: update
      properties:
        hibernate:
          dialect: org.hibernate.dialect.MySQLDialect